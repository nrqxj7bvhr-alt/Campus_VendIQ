<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="UTM Smart Vending">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e6fd9"/>
      <stop offset="1" stop-color="#003d80"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf2fd"/>
      <stop offset="1" stop-color="#cfe0f7"/>
    </linearGradient>
    <linearGradient id="item" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f86ec"/>
      <stop offset="1" stop-color="#0a5bc4"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- soft highlight -->
  <circle cx="150" cy="120" r="170" fill="#ffffff" opacity="0.07"/>

  <!-- Vending machine body -->
  <rect x="150" y="92" width="212" height="328" rx="30" fill="#ffffff"/>
  <rect x="150" y="92" width="212" height="328" rx="30" fill="none" stroke="#0a3f86" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Glass display window -->
  <rect x="170" y="112" width="138" height="214" rx="16" fill="url(#glass)"/>
  <!-- product grid (2 x 3) -->
  <g fill="url(#item)">
    <rect x="184" y="126"  width="46" height="40" rx="9"/>
    <rect x="248" y="126"  width="46" height="40" rx="9"/>
    <rect x="184" y="178"  width="46" height="40" rx="9"/>
    <rect x="248" y="178"  width="46" height="40" rx="9"/>
    <rect x="184" y="230"  width="46" height="40" rx="9"/>
    <rect x="248" y="230"  width="46" height="40" rx="9"/>
  </g>
  <!-- coil shelves -->
  <g stroke="#9bb9e6" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="178" y1="172" x2="300" y2="172"/>
    <line x1="178" y1="224" x2="300" y2="224"/>
    <line x1="178" y1="276" x2="300" y2="276"/>
  </g>
  <!-- glass shine -->
  <path d="M184 122 L214 122 L186 318 L172 318 Z" fill="#ffffff" opacity="0.35"/>

  <!-- Control panel -->
  <rect x="320" y="112" width="26" height="214" rx="10" fill="#e4ecf8"/>
  <circle cx="333" cy="132" r="7" fill="#0a5bc4"/>
  <circle cx="333" cy="156" r="7" fill="#0a5bc4"/>
  <circle cx="333" cy="180" r="7" fill="#0a5bc4"/>
  <!-- coin slot -->
  <rect x="327" y="206" width="12" height="20" rx="6" fill="#0a3f86"/>
  <!-- small screen -->
  <rect x="324" y="238" width="18" height="14" rx="4" fill="#15c08a"/>

  <!-- Dispenser tray -->
  <rect x="170" y="342" width="176" height="56" rx="14" fill="#0a2f63"/>
  <rect x="182" y="352" width="152" height="30" rx="9" fill="#0a3f86"/>
  <rect x="182" y="352" width="152" height="14" rx="7" fill="#ffffff" opacity="0.10"/>

  <!-- legs -->
  <rect x="176" y="416" width="20" height="14" rx="5" fill="#ffffff" opacity="0.85"/>
  <rect x="316" y="416" width="20" height="14" rx="5" fill="#ffffff" opacity="0.85"/>
</svg>
