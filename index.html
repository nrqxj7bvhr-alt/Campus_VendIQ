<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Campus VendIQ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1f4d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VendIQ">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        :root {
            --primary: #1559d6; --primary-2: #3b82f6; --accent: #22d3ee;
            --ink: #0f172a; --muted: #64748b; --border: #e2e8f0;
            --danger: #ef4444; --success: #16a34a; --card: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--ink);
            min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
            padding: 22px; position: relative; overflow: hidden;
            background: radial-gradient(120% 90% at 80% -10%, #1e3a8a 0%, #0b1f4d 55%, #081538 100%);
        }
        /* floating glow blobs */
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(60px); opacity: .5; z-index: 0;
        }
        body::before { width: 320px; height: 320px; background: #2563eb; top: -90px; left: -80px; }
        body::after { width: 280px; height: 280px; background: #22d3ee; bottom: -90px; right: -70px; opacity: .35; }

        .auth-card {
            position: relative; z-index: 1; width: 100%; max-width: 400px; background: var(--card);
            border-radius: 26px; box-shadow: 0 30px 70px rgba(2, 12, 40, .55); overflow: hidden;
            animation: rise .45s cubic-bezier(.2,.8,.2,1);
        }
        @keyframes rise { from { transform: translateY(24px) scale(.98); opacity: 0; } to { transform: none; opacity: 1; } }

        .hero { text-align: center; padding: 36px 24px 26px; color: #fff; position: relative;
            background: linear-gradient(140deg, #1559d6, #1e40af 60%, #15307e); }
        .badge {
            width: 66px; height: 66px; margin: 0 auto 12px; border-radius: 20px;
            background: linear-gradient(150deg, #38bdf8, #2563eb); display: flex; align-items: center; justify-content: center;
            font-size: 34px; box-shadow: 0 10px 26px rgba(2, 12, 40, .45); border: 1px solid rgba(255,255,255,.25);
        }
        .hero h1 { font-size: 25px; font-weight: 800; letter-spacing: -.4px; }
        .hero h1 .iq { color: var(--accent); }
        .hero p { font-size: 12.5px; opacity: .82; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }

        .body { padding: 22px 24px 26px; }
        .segment { position: relative; display: flex; background: #eef3fb; border-radius: 14px; padding: 5px; margin-bottom: 20px; }
        .seg-pill { position: absolute; top: 5px; left: 5px; width: calc(50% - 5px); height: calc(100% - 10px);
            background: #fff; border-radius: 10px; box-shadow: 0 3px 10px rgba(21,89,214,.18);
            transition: transform .28s cubic-bezier(.4,0,.2,1); }
        .segment.admin .seg-pill { transform: translateX(100%); }
        .seg-btn { flex: 1; position: relative; z-index: 1; text-align: center; padding: 11px 0; font-size: 14px;
            font-weight: 700; cursor: pointer; color: var(--muted); transition: color .2s; user-select: none; }
        .seg-btn.active { color: var(--primary); }

        label.fld { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin: 0 0 6px 3px; }
        .inp { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 14px 15px; border: 1.6px solid var(--border); border-radius: 13px;
            font-size: 15px; color: var(--ink); background: #f8fafc; transition: border-color .15s, background .15s; }
        input:focus { outline: none; border-color: var(--primary-2); background: #fff; box-shadow: 0 0 0 4px rgba(59,130,246,.12); }
        .pw-toggle { position: absolute; right: 13px; top: 13px; font-size: 18px; cursor: pointer; opacity: .5; user-select: none; }
        .pw-toggle:hover { opacity: 1; }

        button.primary { width: 100%; padding: 15px; border: none; border-radius: 14px; font-size: 16px; font-weight: 800;
            color: #fff; cursor: pointer; background: linear-gradient(135deg, #2563eb, #1559d6); margin-top: 4px;
            box-shadow: 0 10px 24px rgba(21,89,214,.35); transition: transform .12s, filter .15s, box-shadow .15s; }
        button.primary:hover { filter: brightness(1.05); box-shadow: 0 12px 28px rgba(21,89,214,.45); }
        button.primary:active { transform: scale(.98); }
        button.primary:disabled { opacity: .65; }

        .row-between { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .link { color: var(--primary); font-size: 13px; text-decoration: none; font-weight: 600; cursor: pointer; }
        .link:hover { text-decoration: underline; }
        .err { color: var(--danger); font-size: 13px; margin-top: 13px; text-align: center; min-height: 18px; font-weight: 600; }
        .err.ok { color: var(--success); }
        .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 16px; line-height: 1.55; }
        .spin { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%;
            display: inline-block; vertical-align: middle; animation: sp .7s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }
        .safe { height: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="hero">
            <div class="badge">🛒</div>
            <h1>Campus Vend<span class="iq">IQ</span></h1>
            <p>Smart · Cashless · Campus</p>
        </div>
        <div class="body">
            <div class="segment" id="segment">
                <div class="seg-pill"></div>
                <div class="seg-btn active" id="seg-user" onclick="setRole('user')">👤 User</div>
                <div class="seg-btn" id="seg-admin" onclick="setRole('admin')">🛠️ Admin</div>
            </div>

            <label class="fld">Email</label>
            <div class="inp"><input type="email" id="email" placeholder="name@graduate.utm.my" autocomplete="username"></div>

            <label class="fld">Password</label>
            <div class="inp">
                <input type="password" id="password" placeholder="Your password" autocomplete="current-password" style="padding-right:44px;">
                <span class="pw-toggle" id="pw-toggle" onclick="togglePw()">👁</span>
            </div>

            <button class="primary" id="login-btn" onclick="doLogin()">Log In as User</button>

            <div class="row-between">
                <a class="link" id="signup-link" href="index%20(2).html">New here? Create account</a>
                <a class="link" id="forgot-link" onclick="doForgot()">Forgot password?</a>
            </div>
            <p class="err" id="err"></p>
            <p class="hint" id="hint">Users buy &amp; top up. Admins manage stock, users &amp; alerts.</p>
        </div>
        <div class="safe"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMNKH5ES47w4ywhm-0eykbWNA0ZrU7V-I",
            authDomain: "idp-vending-machine.firebaseapp.com",
            databaseURL: "https://idp-vending-machine-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "idp-vending-machine",
            storageBucket: "idp-vending-machine.firebasestorage.app",
            messagingSenderId: "736954625793",
            appId: "1:736954625793:web:d8985578b01ae2c5f6f500"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const ADMIN_EMAILS = [
            "teoyunje@graduate.utm.my",
            "wonghi@graduate.utm.my",
            "justinliewtze@graduate.utm.my",
            "yubin@graduate.utm.my"
        ];
        const USER_APP  = "index%20(2).html";
        const ADMIN_APP = "admin%20(2).html";

        let role = 'user';

        window.setRole = function (r) {
            role = r;
            document.getElementById('segment').className = 'segment' + (r === 'admin' ? ' admin' : '');
            document.getElementById('seg-user').classList.toggle('active', r === 'user');
            document.getElementById('seg-admin').classList.toggle('active', r === 'admin');
            document.getElementById('login-btn').textContent = r === 'admin' ? 'Log In as Admin' : 'Log In as User';
            document.getElementById('signup-link').style.visibility = r === 'admin' ? 'hidden' : 'visible';
            document.getElementById('hint').textContent = r === 'admin'
                ? 'Admin access is limited to registered staff accounts.'
                : 'Users buy & top up. Admins manage stock, users & alerts.';
            document.getElementById('err').textContent = '';
        };

        window.togglePw = function () {
            const i = document.getElementById('password'), t = document.getElementById('pw-toggle');
            const show = i.type === 'password'; i.type = show ? 'text' : 'password';
            t.textContent = show ? '🙈' : '👁';
        };

        const errEl = document.getElementById('err');
        const setErr = (m, ok = false) => { errEl.textContent = m; errEl.className = 'err' + (ok ? ' ok' : ''); };

        window.doLogin = async function () {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            setErr('');
            if (!email || !password) { setErr('Please enter your email and password.'); return; }
            if (role === 'admin' && !ADMIN_EMAILS.includes(email)) { setErr('This email is not an admin account.'); return; }
            btn.disabled = true; const label = btn.textContent; btn.innerHTML = '<span class="spin"></span>';
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                if (role === 'admin') {
                    if (!ADMIN_EMAILS.includes(cred.user.email)) {
                        await signOut(auth); setErr('Access denied — not an admin account.');
                        btn.disabled = false; btn.textContent = label; return;
                    }
                    setErr('Welcome, admin! Opening dashboard…', true);
                    location.href = ADMIN_APP;
                } else {
                    if (!cred.user.emailVerified) {
                        await signOut(auth); setErr('Please verify your UTM email first (check your inbox).');
                        btn.disabled = false; btn.textContent = label; return;
                    }
                    setErr('Welcome! Opening your wallet…', true);
                    location.href = USER_APP;
                }
            } catch (e) {
                setErr('Invalid email or password.');
                btn.disabled = false; btn.textContent = label;
            }
        };

        window.doForgot = async function () {
            const email = document.getElementById('email').value.trim();
            if (!email) { setErr('Enter your email above first, then tap Forgot password.'); return; }
            try { await sendPasswordResetEmail(auth, email); setErr('Password reset email sent to ' + email, true); }
            catch (e) { setErr('Could not send reset email. Check the address.'); }
        };

        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
    </script>
</body>
</html>
