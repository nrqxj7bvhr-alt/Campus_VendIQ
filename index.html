<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Campus-VendIQ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1463d6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Campus-VendIQ">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <style>
        :root {
            --primary: #0056b3; --primary-dark: #003d80; --primary-light: #e8f0fb;
            --accent: #17a2b8; --danger: #dc3545; --success: #28a745;
            --bg: #f0f2f5; --card: #ffffff; --text: #333; --text-light: #6c757d;
            --border: #dee2e6; --shadow-lg: 0 10px 30px rgba(0,0,0,0.12); --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #0056b3, #003d80);
            min-height: 100vh; min-height: 100dvh; display: flex;
            justify-content: center; align-items: center; padding: 20px;
        }
        .auth-card {
            width: 100%; max-width: 400px; background: var(--card); border-radius: 22px;
            box-shadow: var(--shadow-lg); overflow: hidden; animation: rise .4s ease-out;
        }
        @keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hero { text-align: center; padding: 34px 24px 22px; color: white;
            background: linear-gradient(160deg, #0066d6, #004a99); }
        .hero .logo { font-size: 46px; margin-bottom: 6px; }
        .hero h1 { font-size: 24px; font-weight: 800; letter-spacing: -.3px; }
        .hero p { font-size: 13px; opacity: .85; margin-top: 3px; }
        .body { padding: 22px 24px 28px; }

        /* Segmented role toggle */
        .segment { position: relative; display: flex; background: var(--primary-light);
            border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .segment .seg-pill { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px);
            height: calc(100% - 8px); background: var(--primary); border-radius: 9px;
            transition: transform .25s cubic-bezier(.4,0,.2,1); box-shadow: 0 2px 6px rgba(0,86,179,.3); }
        .segment.admin .seg-pill { transform: translateX(100%); }
        .seg-btn { flex: 1; position: relative; z-index: 1; text-align: center; padding: 11px 0;
            font-size: 14px; font-weight: 700; cursor: pointer; color: var(--primary);
            transition: color .2s; user-select: none; }
        .seg-btn.active { color: #fff; }

        label.fld { display: block; font-size: 12px; font-weight: 700; color: var(--text-light);
            margin: 0 0 5px 2px; }
        input { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 15px; color: var(--text); background: #fff; margin-bottom: 14px; transition: border-color .15s; }
        input:focus { outline: none; border-color: var(--primary); }
        .pw-wrap { position: relative; }
        .pw-toggle { position: absolute; right: 12px; top: 12px; font-size: 18px; cursor: pointer;
            opacity: .55; user-select: none; } .pw-toggle:hover { opacity: 1; }

        button.primary { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none;
            border-radius: 11px; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: filter .15s, transform .1s; }
        button.primary:hover { filter: brightness(92%); } button.primary:active { transform: scale(.98); }
        button.primary:disabled { opacity: .6; cursor: default; }
        .row-between { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
        .link { color: var(--primary); font-size: 13px; text-decoration: none; font-weight: 600; cursor: pointer; }
        .link:hover { text-decoration: underline; }
        .err { color: var(--danger); font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
        .err.ok { color: var(--success); }
        .hint { font-size: 12px; color: var(--text-light); text-align: center; margin-top: 16px; line-height: 1.5; }
        .spin { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff;
            border-radius: 50%; display: inline-block; vertical-align: middle; animation: sp .7s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }
        .safe { height: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="hero">
            <img class="logo" src="icon.svg" alt="" width="64" height="64"
                 style="border-radius:16px;box-shadow:0 10px 22px rgba(0,0,0,.28);">
            <h1>Campus-VendIQ</h1>
            <p>Fast · Cashless · Smart</p>
        </div>
        <div class="body">
            <div class="segment" id="segment">
                <div class="seg-pill"></div>
                <div class="seg-btn active" id="seg-student" onclick="setRole('student')">🎓 Student</div>
                <div class="seg-btn" id="seg-admin" onclick="setRole('admin')">🛠️ Admin</div>
            </div>

            <label class="fld">Email</label>
            <input type="email" id="email" placeholder="name@graduate.utm.my" autocomplete="username">

            <label class="fld">Password</label>
            <div class="pw-wrap">
                <input type="password" id="password" placeholder="Your password" autocomplete="current-password" style="padding-right:42px;">
                <span class="pw-toggle" id="pw-toggle" onclick="togglePw()">👁</span>
            </div>

            <button class="primary" id="login-btn" onclick="doLogin()">Log In as Student</button>

            <div class="row-between">
                <a class="link" id="signup-link" href="index%20(2).html">New student? Create account</a>
                <a class="link" id="forgot-link" onclick="doForgot()">Forgot password?</a>
            </div>
            <p class="err" id="err"></p>
            <p class="hint" id="hint">Students buy & top up. Admins manage stock, users & alerts.</p>
        </div>
        <div class="safe"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, setPersistence, browserLocalPersistence, indexedDBLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMNKH5ES47w4ywhm-0eykbWNA0ZrU7V-I",
            authDomain: "idp-vending-machine.firebaseapp.com",
            databaseURL: "https://idp-vending-machine-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "idp-vending-machine",
            storageBucket: "idp-vending-machine.firebasestorage.app",
            messagingSenderId: "736954625793",
            appId: "1:736954625793:web:d8985578b01ae2c5f6f500"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        // Persist the session so the login carries over to index.html / admin.html
        // instead of dropping to in-memory auth (the "must re-login" bug).
        setPersistence(auth, indexedDBLocalPersistence)
            .catch(() => setPersistence(auth, browserLocalPersistence))
            .catch(() => {});

        const ADMIN_EMAIL = "campusvendiq@gmail.com";
        const ADMIN_EMAILS = [ADMIN_EMAIL];
        const STUDENT_APP = "index%20(2).html";
        const ADMIN_APP   = "admin%20(2).html";

        let role = 'student';

        window.setRole = function (r) {
            role = r;
            document.getElementById('segment').className = 'segment' + (r === 'admin' ? ' admin' : '');
            document.getElementById('seg-student').classList.toggle('active', r === 'student');
            document.getElementById('seg-admin').classList.toggle('active', r === 'admin');
            document.getElementById('login-btn').textContent = r === 'admin' ? 'Log In as Admin' : 'Log In as Student';
            document.getElementById('signup-link').style.visibility = r === 'admin' ? 'hidden' : 'visible';
            document.getElementById('hint').textContent = r === 'admin'
                ? 'Admin access is limited to the project admin Gmail.'
                : 'Students buy & top up. Admins manage stock, users & alerts.';
            document.getElementById('err').textContent = '';
        };

        window.togglePw = function () {
            const i = document.getElementById('password'), t = document.getElementById('pw-toggle');
            const show = i.type === 'password'; i.type = show ? 'text' : 'password';
            t.textContent = show ? '🙈' : '👁';
        };

        const errEl = document.getElementById('err');
        const setErr = (m, ok = false) => { errEl.textContent = m; errEl.className = 'err' + (ok ? ' ok' : ''); };

        window.doLogin = async function () {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            setErr('');
            if (!email || !password) { setErr('Please enter your email and password.'); return; }
            if (role === 'admin' && !ADMIN_EMAILS.includes(email)) {
                setErr('This email is not an admin account.'); return;
            }
            btn.disabled = true; const label = btn.textContent; btn.innerHTML = '<span class="spin"></span>';
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                
                // NEW: Block login if email is not verified (excluding admins)
                if (role !== 'admin' && !cred.user.emailVerified) {
                    await signOut(auth);
                    setErr('Please verify your email address before logging in.');
                    btn.disabled = false; btn.textContent = label; return;
                }

                if (role === 'admin') {
                    if (!ADMIN_EMAILS.includes(cred.user.email)) {
                        await signOut(auth); setErr('Access denied — not an admin account.');
                        btn.disabled = false; btn.textContent = label; return;
                    }
                    setErr('Welcome, admin! Opening dashboard…', true);
                    location.href = ADMIN_APP;
                } else {
                    setErr('Welcome! Opening your wallet…', true);
                    location.href = STUDENT_APP;
                }
            }catch (e) {
                setErr('Invalid email or password.');
                btn.disabled = false; btn.textContent = label;
            }
        };

        window.doForgot = async function () {
            const email = document.getElementById('email').value.trim();
            if (!email) { setErr('Enter your email above first, then tap Forgot password.'); return; }
            try { await sendPasswordResetEmail(auth, email); setErr('Password reset email sent to ' + email, true); }
            catch (e) { setErr('Could not send reset email. Check the address.'); }
        };

        // Enter key submits
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
    </script>
</body>
</html>
